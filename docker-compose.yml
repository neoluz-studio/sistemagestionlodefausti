services:
  postgres:
    image: postgres:16-alpine
    container_name: lodefausti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lodefausti_dev
      POSTGRES_USER: lodefausti
      POSTGRES_PASSWORD: lodefausti_dev_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lodefausti -d lodefausti_dev']
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7-alpine
    container_name: lodefausti-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
